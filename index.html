<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>David de Kok</title>
<meta name="description" content="Persoonlijke site van David de Kok.">

<!-- Fonts -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#141519;
  --text:#eae7e1;
  --muted:#8c8e98;
  --line:#2a2c33;
  --accent:#e3a857;
  --maxw:640px;
}

*{box-sizing:border-box;margin:0;padding:0;}
html{-webkit-text-size-adjust:100%;}

body{
  background:var(--bg);
  color:var(--text);
  font-family:"IBM Plex Sans",system-ui,sans-serif;
  font-size:17px;
  line-height:1.6;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  padding:clamp(1.5rem,5vw,4rem);
  -webkit-font-smoothing:antialiased;
}

.wrap{width:100%;max-width:var(--maxw);margin:auto;}

/* status line (het mono-regeltje bovenaan) */
.status{
  font-family:"IBM Plex Mono",monospace;
  font-size:0.82rem;
  letter-spacing:0.02em;
  color:var(--muted);
  margin-bottom:2.2rem;
}
.status .prompt{color:var(--accent);}

/* naam */
.name{
  font-family:"Space Grotesk",sans-serif;
  font-weight:700;
  font-size:clamp(2.6rem,9vw,4.2rem);
  line-height:1.02;
  letter-spacing:-0.02em;
}
.name .caret{color:var(--accent);font-weight:500;}

/* tagline */
.tagline{
  font-family:"Space Grotesk",sans-serif;
  font-weight:500;
  font-size:clamp(1.05rem,3.5vw,1.35rem);
  margin-top:1rem;
}

/* intro */
.intro{color:var(--muted);margin-top:1.4rem;max-width:52ch;}

/* links */
.links{margin-top:2.6rem;display:flex;flex-wrap:wrap;gap:0.6rem 1.8rem;}
.links a{
  font-family:"IBM Plex Mono",monospace;
  font-size:0.9rem;
  color:var(--text);
  text-decoration:none;
  position:relative;
  padding:0.15rem 0;
}
.links a::before{content:"→ ";color:var(--muted);}
.links a::after{
  content:"";
  position:absolute;left:0;right:0;bottom:-2px;
  height:1px;background:var(--accent);
  transform:scaleX(0);transform-origin:left;
  transition:transform 0.22s ease;
}
.links a:hover,.links a:focus-visible{color:var(--accent);}
.links a:hover::after,.links a:focus-visible::after{transform:scaleX(1);}

/* footer */
.foot{
  font-family:"IBM Plex Mono",monospace;
  font-size:0.75rem;
  color:var(--muted);
  margin-top:auto;
  padding-top:3rem;
}
.foot .dot{color:var(--accent);}

/* keyboard focus */
a:focus-visible{outline:2px solid var(--accent);outline-offset:3px;border-radius:2px;}

/* load-in */
.reveal{opacity:0;transform:translateY(10px);animation:up 0.7s cubic-bezier(.2,.7,.2,1) forwards;}
.d2{animation-delay:0.10s;}
.d3{animation-delay:0.18s;}
.d4{animation-delay:0.26s;}
@keyframes up{to{opacity:1;transform:none;}}

@media (prefers-reduced-motion:reduce){
  .reveal{animation:none;opacity:1;transform:none;}
  .links a::after{transition:none;}
}
</style>
</head>
<body>
  <main class="wrap">

    <!-- WIJZIG: het mono-regeltje bovenaan. Zet hier bijv. je rol of focus. -->
    <p class="status reveal"><span class="prompt">~</span> IT &amp; automation</p>

    <!-- WIJZIG: je naam -->
    <h1 class="name reveal">David de Kok<span class="caret" aria-hidden="true">_</span></h1>

    <!-- WIJZIG: één regel die zegt wat je doet -->
    <p class="tagline reveal d2">Ik bouw en automatiseer dingen.</p>

    <!-- WIJZIG: korte intro, één of twee zinnen -->
    <p class="intro reveal d3">Korte introductie over jezelf komt hier. Houd het direct en persoonlijk: wat je doet, waar je mee bezig bent, en waarom iemand hier terechtkomt.</p>

    <!-- WIJZIG: je links. Vul de href in tussen de aanhalingstekens. Regels weghalen mag ook. -->
    <nav class="links reveal d4">
      <a href="#">GitHub</a>
      <a href="#">LinkedIn</a>
      <a href="#">Socials</a>
      <a href="mailto:jij@daviddekok.nl">E-mail</a>
    </nav>

    <!-- WIJZIG: footer -->
    <footer class="foot reveal d4">daviddekok.nl <span class="dot">&bull;</span> 2026</footer>

  </main>
</body>
</html>
